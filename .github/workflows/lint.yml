name: Count Arduino Files

on:
  push:

jobs:
  count-ino-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Count .ino files
        run: |
          python -c "import pathlib; files=list(pathlib.Path('.').rglob('*.ino')); print(f'Number of .ino files: {len(files)}')"
